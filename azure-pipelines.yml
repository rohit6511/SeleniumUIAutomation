trigger:
- main

pool:
  vmImage: 'windows-latest'

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

# ✅ Use solution file
- script: dotnet restore SeleniumUIAutomation.sln
  displayName: Restore

- script: dotnet build SeleniumUIAutomation.sln --no-restore
  displayName: Build

- script: dotnet test SeleniumUIAutomation.sln --logger "trx"
  displayName: Run Tests